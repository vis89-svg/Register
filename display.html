<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://hirgkfhklwtbiajpxhaw.supabase.co; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>PAN Sorter - Display</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <nav class="nav">
    <div class="nav-links">
      <a href="quick-entry.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Quick Entry
      </a>
      <a href="index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Full Entry
      </a>
      <a href="display.html" class="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M7 16v-3"/>
          <path d="M12 16v-7"/>
          <path d="M17 16V8"/>
        </svg>
        Display
      </a>
    </div>
    <button class="nav-logout" id="logoutBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </nav>

  <div class="container">
    <div class="card">
      <h1 class="card-title">
        <span class="icon-container">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="M7 16v-3"/>
            <path d="M12 16v-7"/>
            <path d="M17 16V8"/>
          </svg>
        </span>
        <span class="title-group">
          <span class="title-main">All Entries</span>
          <span class="title-sub">View, export as CSV or PDF</span>
        </span>
      </h1>

      <div class="date-filter">
        <div class="filter-group">
          <label for="fromDate">From Date</label>
          <input type="date" id="fromDate">
        </div>
        <div class="filter-group">
          <label for="toDate">To Date</label>
          <input type="date" id="toDate">
        </div>
        <button class="btn btn-outline btn-sm" id="applyFilterBtn">Apply</button>
        <button class="btn btn-sm btn-clear" id="clearFilterBtn">Clear</button>
        <button class="btn btn-outline btn-sm" id="editToggleBtn">✏️ Edit Table</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by PAN Number or Organization...">
      </div>

      <div class="actions">
        <button class="btn btn-success btn-sm" id="downloadCsvBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Download CSV
        </button>
        <button class="btn btn-danger btn-sm" id="downloadPdfBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Download PDF
        </button>
        <button class="btn btn-outline btn-sm" id="refreshBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
        <button class="btn btn-outline btn-sm" id="removeDupesBtn" style="display:none">Remove Duplicates</button>
        <button class="btn btn-danger btn-sm" id="deleteAllBtn" style="margin-left:auto">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          Delete All
        </button>
      </div>

      <div class="display-edit-actions" id="displayEditActions" style="display:none">
        <button class="btn btn-success btn-sm" id="saveEditBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Changes
        </button>
        <button class="btn btn-danger btn-sm" id="deleteSelectedBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete Selected
        </button>
        <button class="btn btn-outline btn-sm" id="cancelEditBtn">Cancel</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Sl. No <span class="sort-arrows"><span class="sort-arrow" data-sort="sl" data-dir="asc">▲</span><span class="sort-arrow" data-sort="sl" data-dir="desc">▼</span></span></th>
              <th>Organization / Name <span class="sort-arrows"><span class="sort-arrow" data-sort="name" data-dir="asc">▲</span><span class="sort-arrow" data-sort="name" data-dir="desc">▼</span></span></th>
              <th>PAN Number</th>
              <th>Amount (₹) <span class="sort-arrows"><span class="sort-arrow" data-sort="amount" data-dir="asc">▲</span><span class="sort-arrow" data-sort="amount" data-dir="desc">▼</span></span></th>
              <th>Tax (₹) <span class="sort-arrows"><span class="sort-arrow" data-sort="taxAmount" data-dir="asc">▲</span><span class="sort-arrow" data-sort="taxAmount" data-dir="desc">▼</span></span></th>
              <th>Deduction (%)<br><span style="font-size:0.7rem;font-weight:normal;color:#666">Percentage value</span> <span class="sort-arrows"><span class="sort-arrow" data-sort="deductionPercent" data-dir="asc">▲</span><span class="sort-arrow" data-sort="deductionPercent" data-dir="desc">▼</span></span></th>
              <th>Date of Entry <span class="sort-arrows"><span class="sort-arrow" data-sort="date" data-dir="asc">▲</span><span class="sort-arrow" data-sort="date" data-dir="desc">▼</span></span></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="7" class="text-center text-muted">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination">
        <span class="pagination-info" id="paginationInfo">Showing 0 of 0 entries</span>
        <div class="pagination-controls">
          <button class="pagination-btn" id="prevPageBtn" disabled>◀</button>
          <span class="pagination-current" id="currentPageDisplay">1</span>
          <button class="pagination-btn" id="nextPageBtn" disabled>▶</button>
        </div>
        <div class="pagination-per-page">
          <select id="perPageSelect">
            <option value="10">10 per page</option>
            <option value="25">25 per page</option>
            <option value="50">50 per page</option>
            <option value="100">100 per page</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    // Auth guard
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html?redirect=display.html';
    }

    let allEntries = [];
    let currentDisplay = [];
    let editMode = false;
    let currentSearchQuery = '';
    let searchTimeout;
    let sortConfig = { column: null, direction: 'asc' };
    const tableBody = document.getElementById('tableBody');
    const toast = document.getElementById('toast');
    const searchInput = document.getElementById('searchInput');
    const displayEditActions = document.getElementById('displayEditActions');
    let currentPage = 1;
    let itemsPerPage = 10;

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(function () { toast.classList.remove('show'); }, 3000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function formatCurrency(amount) {
      return '₹ ' + Number(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
      return escaped.replace(re, '<mark class="search-highlight">$1</mark>');
    }

    function renderTable(data, query) {
      currentDisplay = data;
      currentSearchQuery = query || '';

      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-icon">📂</div><p>No matching entries found.</p><div class="empty-sub">Try adjusting your search or filters.</div></td></tr>';
        renderPagination();
        return;
      }

      const totalPages = Math.ceil(data.length / itemsPerPage);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * itemsPerPage;
      const end = Math.min(start + itemsPerPage, data.length);
      const pageData = data.slice(start, end);

      let html = '';
      pageData.forEach(function (entry) {
        const dupClass = entry.duplicate ? ' import-row-duplicate' : '';
        const nameDisplay = highlightText(entry.name, currentSearchQuery) + (entry.duplicate ? ' ⚠' : '');
        html += '<tr class="' + dupClass + '">';
        html += '<td>' + entry.sl + '</td>';
        html += '<td>' + nameDisplay + '</td>';
        html += '<td>' + highlightText(entry.pan, currentSearchQuery) + '</td>';
        html += '<td>' + formatCurrency(entry.amount) + '</td>';
        html += '<td>' + formatCurrency(entry.taxAmount) + '</td>';
        html += '<td>' + entry.deductionPercent + '%</td>';
        html += '<td>' + formatDate(entry.date) + '</td>';
        html += '</tr>';
      });

      tableBody.innerHTML = html;
      renderPagination();
    }

    function renderPagination() {
      const total = currentDisplay.length;
      if (editMode) {
        document.getElementById('paginationInfo').textContent = 'Showing all ' + total + ' entries';
        document.getElementById('currentPageDisplay').textContent = '—';
        document.getElementById('prevPageBtn').disabled = true;
        document.getElementById('nextPageBtn').disabled = true;
        return;
      }
      const totalPages = Math.ceil(total / itemsPerPage) || 1;
      const start = total === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
      const end = Math.min(currentPage * itemsPerPage, total);
      const info = total === 0 ? 'Showing 0 of 0 entries' : 'Showing ' + start + '–' + end + ' of ' + total + ' entries';
      document.getElementById('paginationInfo').textContent = info;
      document.getElementById('currentPageDisplay').textContent = currentPage;
      document.getElementById('prevPageBtn').disabled = currentPage <= 1;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }

    function goToPage(n) {
      const totalPages = Math.ceil(currentDisplay.length / itemsPerPage) || 1;
      if (n < 1 || n > totalPages) return;
      currentPage = n;
      if (editMode) {
        renderEditableDisplay(currentDisplay);
      } else {
        renderTable(currentDisplay, currentSearchQuery);
      }
    }

    function renderEditableDisplay(data) {
      currentDisplay = data;

      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-icon">📂</div><p>No entries to edit.</p></td></tr>';
        renderPagination();
        return;
      }

      let html = '';
      data.forEach(function (entry, idx) {
        const dupClass = entry.duplicate ? ' import-row-duplicate' : '';
        const panValue = escapeHtml(entry.pan);
        html += '<tr class="' + dupClass + '" data-edit-id="' + entry.id + '">';
        html += '<td><input type="checkbox" class="row-select" data-delete-id="' + entry.id + '"></td>';
        html += '<td><input class="edit-input" type="text" value="' + escapeHtml(entry.name) + '" data-field="name" data-edit-id="' + entry.id + '"></td>';
        html += '<td><input class="edit-input" type="text" value="' + panValue + '" data-field="pan" data-edit-id="' + entry.id + '">' + (entry.duplicate ? '<span style="margin-left:4px;font-size:0.85rem">⚠</span>' : '') + '</td>';
        html += '<td><input class="edit-input" type="number" step="0.01" value="' + entry.amount + '" data-field="amount" data-edit-id="' + entry.id + '"></td>';
        html += '<td><input class="edit-input" type="number" step="0.01" value="' + entry.taxAmount + '" data-field="taxAmount" data-edit-id="' + entry.id + '"></td>';
        html += '<td><input class="edit-input" type="number" step="0.01" value="' + entry.deductionPercent + '" data-field="deductionPercent" data-edit-id="' + entry.id + '"></td>';
        html += '<td><input class="edit-input" type="date" value="' + (entry.date || '') + '" data-field="date" data-edit-id="' + entry.id + '"></td>';
        html += '</tr>';
      });

      tableBody.innerHTML = html;

      renderPagination();

      // Highlight row when checkbox checked
      tableBody.querySelectorAll('.row-select').forEach(function (cb) {
        cb.addEventListener('change', function () {
          this.closest('tr').classList.toggle('tr-selected', this.checked);
        });
      });
    }

    function readEditsFromDOM() {
      const rows = tableBody.querySelectorAll('tr[data-edit-id]');
      rows.forEach(function (row) {
        const id = parseInt(row.dataset.editId);
        if (isNaN(id)) return;
        const entry = allEntries.find(function (e) { return e.id === id; });
        if (!entry) return;
        row.querySelectorAll('.edit-input').forEach(function (input) {
          const field = input.dataset.field;
          if (field === 'name') entry.name = input.value.trim();
          else if (field === 'pan') entry.pan = input.value.toUpperCase().trim();
          else if (field === 'amount') entry.amount = parseFloat(input.value) || 0;
          else if (field === 'taxAmount') entry.taxAmount = parseFloat(input.value) || 0;
          else if (field === 'deductionPercent') entry.deductionPercent = parseFloat(input.value) || 0;
          else if (field === 'date') entry.date = input.value || null;
        });
      });
    }

    function applySearch() {
      currentSearchQuery = searchInput.value.trim().toLowerCase();
      currentPage = 1;

      if (editMode) {
        readEditsFromDOM();
        if (!currentSearchQuery) {
          renderEditableDisplay(allEntries);
        } else {
          const filtered = allEntries.filter(function (entry) {
            return entry.pan.toLowerCase().includes(currentSearchQuery) ||
                   entry.name.toLowerCase().includes(currentSearchQuery);
          });
          renderEditableDisplay(filtered);
        }
        return;
      }

      if (!currentSearchQuery) {
        renderTable(allEntries);
        return;
      }
      const filtered = allEntries.filter(function (entry) {
        return entry.pan.toLowerCase().includes(currentSearchQuery) ||
               entry.name.toLowerCase().includes(currentSearchQuery);
      });
      renderTable(filtered, currentSearchQuery);
    }

    function sortEntries(column, direction) {
      if (editMode) readEditsFromDOM();

      sortConfig.column = column;
      sortConfig.direction = direction;

      var sorted = allEntries.slice().sort(function (a, b) {
        var valA, valB;
        if (column === 'sl') {
          valA = a.id;
          valB = b.id;
        } else if (column === 'name') {
          valA = (a.name || '').toLowerCase();
          valB = (b.name || '').toLowerCase();
        } else if (column === 'date') {
          valA = a.date || '';
          valB = b.date || '';
        } else {
          valA = a[column] != null ? a[column] : 0;
          valB = b[column] != null ? b[column] : 0;
        }
        if (valA < valB) return -1;
        if (valA > valB) return 1;
        return 0;
      });

      if (direction === 'desc') sorted.reverse();

      allEntries = sorted;

      document.querySelectorAll('.sort-arrow').forEach(function (el) {
        el.classList.toggle('active', el.dataset.sort === column && el.dataset.dir === direction);
      });

      applySearch();
    }

    async function loadEntries(fromDate, toDate) {
      editMode = false;
      displayEditActions.style.display = 'none';
      document.getElementById('editToggleBtn').textContent = '✏️ Edit Table';
      sortConfig.column = null;
      sortConfig.direction = 'asc';
      document.querySelectorAll('.sort-arrow').forEach(function (el) { el.classList.remove('active'); });

        tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>';

      let query = supabase.from('entries').select('*');
      if (fromDate) query = query.gte('date', fromDate);
      if (toDate) query = query.lte('date', toDate);
      query = query.order('created_at', { ascending: false });

      const { data, error } = await query;

      if (error) {
        tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Error loading data.</td></tr>';
        showToast('Failed to load entries.', 'error');
        return;
      }

      allEntries = [];

      if (!data || data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-icon">📂</div><p>No entries yet</p><div class="empty-sub">Use Quick Entry or Full Entry to add records.</div></td></tr>';
        return;
      }

      data.forEach(function (entry, index) {
        allEntries.push({
          id: entry.id,
          sl: data.length - index,
          name: entry.name || '-',
          pan: entry.pan_number || '-',
          amount: entry.amount != null ? entry.amount : 0,
          taxAmount: entry.tax_amount != null ? entry.tax_amount : 0,
          deductionPercent: entry.deduction_percentage != null ? entry.deduction_percentage : 0,
          date: entry.date || '',
          created_at: entry.created_at
        });
      });

      searchInput.value = '';
      flagDuplicates();
      currentPage = 1;
      renderTable(allEntries);
    }

    function flagDuplicates() {
      const seen = new Set();
      allEntries.forEach(function (entry) {
        const pan = (entry.pan || '').toUpperCase().trim();
        const name = (entry.name || '').trim().toLowerCase();
        const key = pan + '|' + name + '|' + entry.amount + '|' + (entry.date || '').trim();
        if (seen.has(key)) {
          entry.duplicate = true;
        } else {
          entry.duplicate = false;
          seen.add(key);
        }
      });
      updateDupesButton();
    }

    function updateDupesButton() {
      const hasDupes = allEntries.some(function (e) { return e.duplicate; });
      document.getElementById('removeDupesBtn').style.display = hasDupes ? 'inline-block' : 'none';
    }

    function toggleEditMode() {
      if (!editMode) {
        editMode = true;
        displayEditActions.style.display = 'flex';
        document.getElementById('editToggleBtn').textContent = '✏️ Exit Edit Mode';
        applySearch();
      } else {
      editMode = false;
      displayEditActions.style.display = 'none';
      document.getElementById('editToggleBtn').textContent = '✏️ Edit Table';
      sortConfig.column = null;
      sortConfig.direction = 'asc';
      document.querySelectorAll('.sort-arrow').forEach(function (el) { el.classList.remove('active'); });
        applySearch();
      }
    }

    async function saveEdits() {
      readEditsFromDOM();

      const changed = allEntries.filter(function (e) { return e.id != null; });
      if (changed.length === 0) { showToast('No rows to save.', 'error'); return; }

      const saveBtn = document.getElementById('saveEditBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span> Saving...';

      let successCount = 0;
      let failCount = 0;

      for (let i = 0; i < changed.length; i++) {
        const e = changed[i];
        const { error } = await supabase
          .from('entries')
          .update({
            pan_number: e.pan,
            name: e.name,
            date: e.date,
            amount: e.amount,
            tax_amount: e.taxAmount,
            deduction_percentage: e.deductionPercent
          })
          .eq('id', e.id);

        if (error) failCount++;
        else successCount++;
      }

      saveBtn.disabled = false;
      saveBtn.innerHTML = 'Save Changes';

      editMode = false;
      displayEditActions.style.display = 'none';
      document.getElementById('editToggleBtn').textContent = '✏️ Edit Table';

      await loadEntries();
      if (failCount > 0) showToast(successCount + ' saved, ' + failCount + ' failed.', 'error');
      else showToast('All ' + successCount + ' changes saved!', 'success');
    }

    function deleteSelected() {
      if (editMode) readEditsFromDOM();

      const checkboxes = tableBody.querySelectorAll('.row-select:checked');
      if (checkboxes.length === 0) {
        showToast('No rows selected.', 'error');
        return;
      }

      if (!confirm('Delete ' + checkboxes.length + ' selected entries?')) return;

      const toDelete = [];
      checkboxes.forEach(function (cb) {
        const id = parseInt(cb.dataset.deleteId);
        if (!isNaN(id)) {
          const found = allEntries.find(function(e) { return e.id === id; });
          if (found) toDelete.push(found);
        }
      });

      if (toDelete.length === 0) return;

      let deletedCount = 0;
      const promises = [];

      toDelete.forEach(function (entry) {
        if (entry.id) {
          promises.push(
            supabase.from('entries').delete().eq('id', entry.id).then(function (res) {
              if (!res.error) deletedCount++;
            })
          );
        } else {
          deletedCount++;
        }
      });

      Promise.all(promises).then(function () {
        const ids = new Set(toDelete.map(function (e) { return e.id || e; }));
        allEntries = allEntries.filter(function (e) { return !ids.has(e.id || e); });
        flagDuplicates();
        if (sortConfig.column) {
          sortEntries(sortConfig.column, sortConfig.direction);
        } else {
          allEntries.forEach(function (e, i) { e.sl = allEntries.length - i; });
          applySearch();
        }
        showToast(deletedCount + ' entries deleted.', 'success');
      });
    }

    async function removeDupes() {
      const toDelete = allEntries.filter(function (e) { return e.duplicate; });
      if (toDelete.length === 0) {
        showToast('No duplicates found.', 'error');
        return;
      }
      if (!confirm('Delete ' + toDelete.length + ' duplicate entries?')) return;

      let deletedCount = 0;
      for (let i = 0; i < toDelete.length; i++) {
        const entry = toDelete[i];
        if (entry.id) {
          const { error } = await supabase.from('entries').delete().eq('id', entry.id);
          if (!error) deletedCount++;
        } else {
          deletedCount++;
        }
      }
      await loadEntries();
      showToast(deletedCount + ' duplicate entries removed.', 'success');
    }

    function downloadCSV() {
      if (currentDisplay.length === 0) { showToast('No data to export.', 'error'); return; }
      
      // Audit log export
      supabase.from('audit_log').insert({
        action: 'EXPORT_CSV',
        table_name: 'entries',
        details: { rowCount: currentDisplay.length, dateRange: { from: document.getElementById('fromDate').value || null, to: document.getElementById('toDate').value || null } }
      });

      const rows = [['Sl.No', 'Organization / Name', 'PAN Number', 'Amount (₹)', 'Tax (₹)', 'Deduction (%)', 'Date of Entry']];
      currentDisplay.forEach(function (entry, i) {
        rows.push([i + 1, entry.name, entry.pan, entry.amount, entry.taxAmount, entry.deductionPercent, entry.date]);
      });
      const csv = rows.map(function (row) {
        return row.map(function (cell) {
          const val = String(cell);
          if (val.includes(',') || val.includes('"') || val.includes('\n')) return '"' + val.replace(/"/g, '""') + '"';
          return val;
        }).join(',');
      }).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'PAN_Entries_' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      showToast('CSV downloaded successfully!', 'success');
    }

    function downloadPDF() {
      if (currentDisplay.length === 0) { showToast('No data to export.', 'error'); return; }

      // Audit log export
      supabase.from('audit_log').insert({
        action: 'EXPORT_PDF',
        table_name: 'entries',
        details: { rowCount: currentDisplay.length, dateRange: { from: document.getElementById('fromDate').value || null, to: document.getElementById('toDate').value || null } }
      });

      const doc = new jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      doc.setFontSize(16);
      doc.text('PAN Entries Report', 14, 20);
      doc.setFontSize(10);
      doc.text('Generated: ' + new Date().toLocaleString('en-IN'), 14, 27);
      const tableData = currentDisplay.map(function (entry, i) {
        return [i + 1, entry.name, entry.pan, 'Rs. ' + Number(entry.amount).toLocaleString('en-IN'), 'Rs. ' + Number(entry.taxAmount).toLocaleString('en-IN'), entry.deductionPercent + '%', entry.date];
      });
      doc.autoTable({
        head: [['Sl.No', 'Organization / Name', 'PAN Number', 'Amount (₹)', 'Tax (₹)', 'Deduction (%)', 'Date of Entry']],
        body: tableData,
        startY: 32,
        styles: { fontSize: 9, cellPadding: 3 },
        headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [248, 250, 252] }
      });
      doc.save('PAN_Entries_' + new Date().toISOString().slice(0, 10) + '.pdf');
      showToast('PDF downloaded successfully!', 'success');
    }

    // Event listeners
    document.getElementById('downloadCsvBtn').addEventListener('click', downloadCSV);
    document.getElementById('downloadPdfBtn').addEventListener('click', downloadPDF);

    document.getElementById('refreshBtn').addEventListener('click', function () {
      document.getElementById('fromDate').value = '';
      document.getElementById('toDate').value = '';
      loadEntries();
      showToast('Data refreshed.', 'success');
    });

    searchInput.addEventListener('input', function () {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(applySearch, 200);
    });

    document.getElementById('applyFilterBtn').addEventListener('click', function () {
      const fromDate = document.getElementById('fromDate').value || undefined;
      const toDate = document.getElementById('toDate').value || undefined;
      loadEntries(fromDate, toDate);
      showToast('Filter applied.', 'success');
    });

    document.getElementById('clearFilterBtn').addEventListener('click', function () {
      document.getElementById('fromDate').value = '';
      document.getElementById('toDate').value = '';
      searchInput.value = '';
      loadEntries();
      showToast('Filter cleared.', 'success');
    });

    document.getElementById('editToggleBtn').addEventListener('click', toggleEditMode);
    document.getElementById('saveEditBtn').addEventListener('click', saveEdits);
    document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelected);
    document.getElementById('removeDupesBtn').addEventListener('click', removeDupes);

    document.querySelector('thead').addEventListener('click', function (e) {
      var arrow = e.target.closest('.sort-arrow');
      if (arrow) sortEntries(arrow.dataset.sort, arrow.dataset.dir);
    });

    document.getElementById('cancelEditBtn').addEventListener('click', function () {
      loadEntries();
      showToast('Edits discarded.', 'success');
    });

    document.getElementById('logoutBtn').addEventListener('click', async function () {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    document.getElementById('deleteAllBtn').addEventListener('click', async function () {
      if (!confirm('Delete ALL entries? This cannot be undone.')) return;
      if (!confirm('Are you sure? All data will be permanently removed.')) return;

      const btn = document.getElementById('deleteAllBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Deleting...';

      const { error } = await supabase.from('entries').delete().gte('id', 0);

      btn.disabled = false;
      btn.innerHTML = 'Delete All';

      if (error) {
        showToast('Failed to delete: ' + error.message, 'error');
      } else {
        showToast('All entries deleted.', 'success');
        loadEntries();
      }
    });

    document.getElementById('prevPageBtn').addEventListener('click', function () {
      goToPage(currentPage - 1);
    });

    document.getElementById('nextPageBtn').addEventListener('click', function () {
      goToPage(currentPage + 1);
    });

    document.getElementById('perPageSelect').addEventListener('change', function () {
      itemsPerPage = parseInt(this.value);
      currentPage = 1;
      if (editMode) {
        renderEditableDisplay(currentDisplay);
      } else {
        renderTable(currentDisplay, currentSearchQuery);
      }
    });

    // Load on page load
    loadEntries();
  </script>

</body>
</html>
