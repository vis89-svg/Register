<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://hirgkfhklwtbiajpxhaw.supabase.co; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>PAN Sorter - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .card {
      max-width: 340px;
      padding: 1.6rem;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 24px;
      box-shadow:
        0 20px 45px rgba(0,0,0,0.18),
        0 1px 0 rgba(255,255,255,0.35) inset;
    }
    body {
      background: url('BACKGROUND IMAGE.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 340px;
      margin: 0;
    }
    .auth-form { display: none; margin-top: 1rem; }
    .auth-form.active { display: block; }
    .auth-toggle { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); position: relative; z-index: 2; }
    .auth-toggle a { color: var(--primary); text-decoration: none; font-weight: 500; display: inline-block; padding: 0.4rem 0.6rem; }
    .auth-toggle a:hover { text-decoration: underline; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 2.5rem; }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 1.15rem;
      line-height: 1;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .password-toggle:hover { opacity: 1; }
    .password-toggle svg { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1 id="formTitle">Login</h1>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required autocomplete="email">
        </div>

        <div class="form-group">
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <span class="password-toggle" onclick="togglePassword(this,'password')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; justify-content: center;">
          Login
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <input type="email" id="signupEmail" placeholder="Email" required autocomplete="email">
        </div>

        <div class="form-group">
          <div class="password-wrapper">
            <input type="password" id="signupPassword" placeholder="Password" required autocomplete="new-password" minlength="8">
            <span class="password-toggle" onclick="togglePassword(this,'signupPassword')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
          </div>
        </div>

        <div class="form-group">
          <div class="password-wrapper">
            <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required autocomplete="new-password" minlength="8">
            <span class="password-toggle" onclick="togglePassword(this,'signupConfirmPassword')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="signupSubmitBtn" style="width: 100%; justify-content: center;">
          Create Account
        </button>
      </form>

      <div class="auth-toggle" id="authToggle">
        <span id="toggleText">Don't have an account? </span>
        <a href="#" id="toggleLink">Create Account</a>
      </div>

      <div id="toast" class="toast"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    window.togglePassword = function (el, inputId) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        el.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        input.type = 'password';
        el.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    };

    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const signupSubmitBtn = document.getElementById('signupSubmitBtn');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    const formTitle = document.getElementById('formTitle');
    const toast = document.getElementById('toast');

    let isLoginMode = true;

    // Get redirect URL from query params
    const urlParams = new URLSearchParams(window.location.search);
    const redirectTo = urlParams.get('redirect') || 'quick-entry.html';

    function showToast(message, type = 'error') {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function setLoading(btn, isLoading, loadingText, normalText) {
      if (isLoading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> ' + loadingText;
      } else {
        btn.disabled = false;
        btn.innerHTML = normalText;
      }
    }

    function switchToLogin() {
      isLoginMode = true;
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      formTitle.textContent = 'Login';
      toggleText.textContent = "Don't have an account? ";
      toggleLink.textContent = 'Create Account';
      loginForm.reset();
      signupForm.reset();
    }

    function switchToSignup() {
      isLoginMode = false;
      signupForm.classList.add('active');
      loginForm.classList.remove('active');
      formTitle.textContent = 'Create Account';
      toggleText.textContent = 'Already have an account? ';
      toggleLink.textContent = 'Login';
      loginForm.reset();
      signupForm.reset();
    }

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (isLoginMode) {
        switchToSignup();
      } else {
        switchToLogin();
      }
    });

    // Login form submit
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Please enter email and password', 'error');
        return;
      }

      setLoading(submitBtn, true, 'Signing in...', 'Sign In');

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      setLoading(submitBtn, false, 'Signing in...', 'Sign In');

      if (error) {
        showToast('Invalid credentials: ' + error.message, 'error');
        return;
      }

      if (data.session) {
        showToast('Signed in successfully!', 'success');
        setTimeout(() => {
          window.location.href = redirectTo;
        }, 500);
      }
    });

    // Signup form submit
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;

      if (!email || !password || !confirmPassword) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      if (password.length < 8) {
        showToast('Password must be at least 8 characters', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }

      setLoading(signupSubmitBtn, true, 'Creating account...', 'Create Account');

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { persistence: 'session' }
        }
      });

      setLoading(signupSubmitBtn, false, 'Creating account...', 'Create Account');

      if (error) {
        showToast('Signup failed: ' + error.message, 'error');
        return;
      }

      // If email confirmation is OFF, user is auto-signed in (data.session exists)
      // If email confirmation is ON, data.session is null, data.user exists
      if (data.session) {
        showToast('Account created! Signing in...', 'success');
        setTimeout(() => {
          window.location.href = redirectTo;
        }, 500);
      } else if (data.user) {
        // Email confirmation required (shouldn't happen with our config, but handle it)
        showToast('Account created! Please check your email to confirm.', 'success');
        setTimeout(() => {
          switchToLogin();
        }, 2000);
      }
    });

    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = redirectTo;
      }
    });
  </script>
</body>
</html>
