<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://hirgkfhklwtbiajpxhaw.supabase.co; img-src 'self' data:; font-src 'self' data:;">
  <title>PAN Sorter - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto;">
      <h1>Sign In</h1>
      <p class="subtitle">PAN Sorter - Secure Entry</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; margin-top: 1rem;">
          Sign In
        </button>
      </form>

      <div id="toast" class="toast"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    function showToast(message, type = 'error') {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    }

    // Get redirect URL from query params
    const urlParams = new URLSearchParams(window.location.search);
    const redirectTo = urlParams.get('redirect') || 'index.html';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Please enter email and password', 'error');
        return;
      }

      setLoading(true);

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password,
        options: { persistence: 'session' } // 8-hour inactivity timeout
      });

      setLoading(false);

      if (error) {
        showToast('Invalid credentials: ' + error.message, 'error');
        return;
      }

      if (data.session) {
        showToast('Signed in successfully!', 'success');
        setTimeout(() => {
          window.location.href = redirectTo;
        }, 500);
      }
    });

    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = redirectTo;
      }
    });
  </script>
</body>
</html>
