<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://hirgkfhklwtbiajpxhaw.supabase.co; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>PAN Sorter - Quick Entry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8FAFC;
      min-height: 100vh;
      color: #0F172A;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Navigation ===== */
    .nav {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      margin-top: 5px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left, .nav-right {
      flex: 1;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .nav-tabs {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      height: 64px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #E2E8F0;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.05);
      overflow: hidden;
    }

    .nav-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 56px;
      padding: 0 30px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .nav-tab.active {
      background: #4F46E5;
      color: #fff;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
    }

    .nav-tab:not(.active) {
      background: #fff;
      color: #4F46E5;
    }

    .nav-tab:not(.active):hover {
      background: #F8FAFC;
    }

    .nav-tab svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: #4F46E5;
      stroke-width: 2.5;
    }

    .nav-tab.active svg {
      stroke: #fff;
      stroke-width: 2.5;
    }

    .nav-logout {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      height: 64px;
      padding: 0 1.25rem;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #EF4444;
      background: #fff;
      border: 1px solid #FCA5A5;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: inherit;
      text-decoration: none;
    }

    .nav-logout:hover {
      background: #FEF2F2;
    }

    .nav-logout svg {
      width: 20px;
      height: 20px;
    }

    /* ===== Layout ===== */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .container + .container {
      margin-top: 32px;
    }

    .page-content {
      padding: 23px 0;
    }

    /* ===== Cards ===== */
    .card {
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: 0 10px 32px rgba(15, 23, 42, 0.06);
      padding: 40px;
    }

    .card-title {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      font-size: 24px;
      font-weight: 700;
      color: #0F172A;
      line-height: 1.2;
    }

    .icon-container {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: #F3F0FF;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-container svg {
      width: 22px;
      height: 22px;
      stroke: #4F46E5;
    }

    .card:first-of-type .icon-container svg {
      width: 28px;
      height: 28px;
    }

    .card:first-of-type .icon-container {
      width: 64px;
      height: 64px;
    }

    .card:last-of-type {
      min-height: 307px;
    }

    .card-subtitle {
      font-size: 14px;
      color: #64748B;
      margin-top: 2px;
      margin-bottom: 1rem;
      font-weight: 400;
      line-height: 1.5;
      padding-left: 76px;
    }

    /* ===== Form ===== */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748B;
    }

    .input-icon-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon-wrapper .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #94A3B8;
      stroke: #94A3B8;
      pointer-events: none;
      flex-shrink: 0;
    }

    .input-icon-wrapper input {
      width: 100%;
      height: 56px;
      padding: 0 1rem 0 42px;
      border: 1px solid #E2E8F0;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 400;
      font-family: inherit;
      color: #0F172A;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-icon-wrapper input::placeholder {
      color: #94A3B8;
    }

    .input-icon-wrapper input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }



    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      height: 52px;
      padding: 0 1.75rem;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: #4F46E5;
      color: #fff;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.20);
      min-width: 170px;
      height: 52px;
      padding: 0 28px;
    }

    .btn-primary:hover {
      background: #4338CA;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-success {
      background: #059669;
      color: #fff;
    }

    .btn-success:hover {
      background: #047857;
      box-shadow: 0 4px 16px rgba(5, 150, 105, 0.3);
    }

    .btn-success:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-danger {
      background: #EF4444;
      color: #fff;
    }

    .btn-danger:hover {
      background: #DC2626;
    }

    .btn-danger:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      color: #4F46E5;
      border: 1.5px solid #4F46E5;
      height: 52px;
    }

    .btn-outline:hover {
      background: #F8F7FF;
    }

    .btn-sm {
      height: 42px;
      padding: 0 1.25rem;
      font-size: 0.875rem;
    }

    /* ===== Helper Row ===== */
    .helper-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.75rem 0;
      font-size: 0.85rem;
      font-weight: 400;
      color: #64748B;
      line-height: 1.5;
    }

    .helper-row svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      color: #94A3B8;
      stroke: #94A3B8;
    }

    /* ===== Autocomplete ===== */
    .autocomplete-group {
      position: relative;
    }

    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-dropdown.show {
      display: block;
    }

    .dropdown-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s;
      border-bottom: 1px solid #F1F5F9;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: #F0EFFF;
    }

    .dropdown-pan {
      font-weight: 600;
      font-size: 0.875rem;
      color: #0F172A;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }

    .dropdown-name {
      font-size: 0.825rem;
      color: #64748B;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 55%;
      text-align: right;
    }

    /* ===== Upload Zone ===== */
    .upload-zone {
      border: 1.5px dashed #CBD5E1;
      border-radius: 18px;
      padding: 48px 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #FAFBFC;
      margin-bottom: 0;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #4F46E5;
      background: #F0EFFF;
    }

    .upload-zone.has-file {
      border-color: #059669;
      background: #F0FDF4;
    }

    .upload-zone-icon {
      font-size: 48px;
      margin-bottom: 0.75rem;
      display: block;
    }

    .upload-zone-text {
      font-size: 18px;
      font-weight: 600;
      color: #334155;
    }

    .upload-zone-hint {
      font-size: 16px;
      color: #64748B;
      margin-top: 0.3rem;
    }

    /* ===== Import Stats ===== */
    .import-stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .stat-badge {
      padding: 0.375rem 0.875rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .stat-badge.total {
      background: #EEF2FF;
      color: #4338CA;
    }

    .stat-badge.valid {
      background: #DCFCE7;
      color: #166534;
    }

    .stat-badge.invalid {
      background: #FEF2F2;
      color: #991B1B;
    }

    .stat-badge.duplicate {
      background: #FEF9C3;
      color: #854D0E;
    }

    /* ===== Import Actions ===== */
    .import-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }

    .edit-toggle {
      margin-bottom: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ===== Table ===== */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid #F1F5F9;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #F8FAFC;
      text-align: left;
      padding: 0.875rem 1rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #64748B;
      border-bottom: 1px solid #E2E8F0;
      white-space: nowrap;
    }

    tbody td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #F1F5F9;
      color: #334155;
      font-size: 0.875rem;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #FAFBFC;
    }

    .import-row-invalid td {
      background: #FEF2F2;
    }

    .import-row-duplicate td {
      background: #FEF9C3;
    }

    /* ===== Edit Mode ===== */
    .edit-input {
      width: 100%;
      min-width: 60px;
      padding: 0.35rem 0.5rem;
      border: none;
      border-bottom: 2px solid #4F46E5;
      font-size: 0.85rem;
      outline: none;
      background: transparent;
      font-family: inherit;
      box-sizing: border-box;
      transition: background 0.15s;
    }

    .edit-input:focus {
      background: #F0EFFF;
    }

    .row-select {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #94A3B8;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      display: inline-block;
      vertical-align: middle;
      transition: all 0.15s;
      background: #fff;
    }

    .row-select:checked {
      border-color: #EF4444;
      background: #EF4444;
      box-shadow: inset 0 0 0 3px #fff;
    }

    .tr-selected {
      background: #FEF2F2 !important;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .toast.success {
      background: #059669;
    }

    .toast.error {
      background: #EF4444;
    }

    /* ===== Spinner ===== */
    .spinner {
      display: inline-block;
      width: 1.2rem;
      height: 1.2rem;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner-dark {
      border-color: rgba(79, 70, 229, 0.2);
      border-top-color: #4F46E5;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Empty state ===== */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #94A3B8;
    }

    .empty-state p {
      font-size: 1rem;
    }

    .text-center { text-align: center; }
    .text-muted { color: #94A3B8; }

    /* ===== Responsive ===== */
    @media (max-width: 1279px) {
      .card {
        padding: 28px;
      }
    }

    @media (max-width: 1023px) {
      .nav {
        padding: 0 1.25rem;
        height: auto;
        min-height: 76px;
        flex-wrap: wrap;
        gap: 0.75rem;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }

      .nav-left { display: none; }

      .nav-tabs {
        flex: 1;
        justify-content: center;
        height: 56px;
      border-radius: 8px;
      }

      .nav-tab {
        width: auto;
        flex: 1;
        min-width: 0;
        padding: 0 1rem;
        font-size: 15px;
        height: 56px;
        border-radius: 8px;
      }

      .nav-right {
        flex: 0 0 auto;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .card-title {
        font-size: 20px;
      }

      .card-subtitle {
        font-size: 13px;
        padding-left: 76px;
      }

      .container {
        padding: 0 1.25rem;
      }

      .upload-zone {
        padding: 28px 1.5rem;
      }
    }

    @media (max-width: 767px) {
      .nav {
        flex-direction: column;
        padding: 0.75rem 1rem;
        gap: 0.5rem;
      }

      .nav-left { display: none; }

      .nav-tabs {
        width: 100%;
        height: 48px;
        border-radius: 14px;
      }

      .nav-tab {
        height: 48px;
        font-size: 0.8rem;
        padding: 0 0.5rem;
        border-radius: 8px;
      }

      .nav-right {
        width: 100%;
        justify-content: center;
      }

      .nav-logout {
        width: 100%;
        justify-content: center;
        height: 48px;
      }

      .page-content {
        padding: 1.25rem 0;
      }

      .card {
        padding: 20px;
        border-radius: 18px;
      }

      .card-title {
        font-size: 16px;
        gap: 12px;
      }

      .icon-container {
        width: 44px;
        height: 44px;
        border-radius: 14px;
      }

      .icon-container svg {
        width: 18px;
        height: 18px;
      }

      .card-subtitle {
        font-size: 12px;
        padding-left: 56px;
      margin-bottom: 0.5rem;
      }

      .container {
        padding: 0 1rem;
      }

      .container + .container {
        margin-top: 20px;
      }

      .form-row {
        gap: 0.75rem;
      margin-bottom: 1.25rem;
      }

      .input-icon-wrapper input {
        height: 48px;
        font-size: 0.925rem;
      }

      .btn {
        height: 48px;
        font-size: 0.9rem;
      }

      .btn-primary {
        min-width: 100%;
        height: 48px;
      }

      .upload-zone {
        padding: 24px 1rem;
        border-radius: 14px;
      }

      .upload-zone-icon {
        font-size: 32px;
      }

      .toast {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        text-align: center;
      }

      .import-actions {
        flex-direction: column;
      }

      .import-actions .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div id="authGuard" style="display: none;">

    <!-- ===== Navigation ===== -->
    <nav class="nav">
      <div class="nav-left"></div>
      <div class="nav-tabs">
        <a href="quick-entry.html" class="nav-tab active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Quick Entry
        </a>
        <a href="index.html" class="nav-tab">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          Full Entry
        </a>
        <a href="display.html" class="nav-tab">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="M7 16v-3"/>
            <path d="M12 16v-7"/>
            <path d="M17 16V8"/>
          </svg>
          Display
        </a>
      </div>
      <div class="nav-right">
        <button class="nav-logout" id="logoutBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </button>
      </div>
    </nav>

    <!-- ===== Page Content ===== -->
    <div class="page-content">

      <!-- ===== Card 1: Quick Entry ===== -->
      <div class="container">
        <div class="card">
          <h1 class="card-title">
            <span class="icon-container">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#4F46E5">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </span>
            Quick Entry
          </h1>
          <p class="card-subtitle">Enter PAN and Organization Name — date and amounts are set to defaults</p>

          <form id="entryForm">
            <div class="form-row">
              <div class="form-group autocomplete-group">
                <div class="input-icon-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                    <line x1="1" y1="10" x2="23" y2="10" />
                  </svg>
                  <input type="text" id="panNumber" placeholder="e.g. ABCDE1234F" maxlength="10" required autocomplete="off">
                </div>
                <div id="panDropdown" class="autocomplete-dropdown"></div>
              </div>
              <div class="form-group">
                <div class="input-icon-wrapper">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
                    <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
                    <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
                    <path d="M10 6h4" />
                    <path d="M10 10h4" />
                    <path d="M10 14h4" />
                    <path d="M10 18h4" />
                  </svg>
                  <input type="text" id="name" placeholder="Full name or organization" required>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Save Entry
            </button>

          </form>
        </div>
      </div>

      <!-- ===== Card 2: Import from CSV ===== -->
      <div class="container">
        <div class="card">
          <h2 class="card-title">
            <span class="icon-container">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#4F46E5">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
              </svg>
            </span>
            Import from CSV
          </h2>
          <p class="card-subtitle">Upload a CSV with PAN Number and Organization Name (2 columns only)</p>

          <div class="upload-zone" id="uploadZone">
            <span class="upload-zone-icon">📄</span>
            <div class="upload-zone-text">Click to select CSV file</div>
            <div class="upload-zone-hint">or drag &amp; drop here</div>
            <input type="file" id="fileInput" accept=".csv" style="display:none">
          </div>

          <div id="importSection" style="display:none">
            <div class="import-stats" id="statsBar"></div>

            <div class="edit-toggle" id="editToggleSection" style="display:none">
              <button class="btn btn-outline btn-sm" id="editToggleBtn">✏️ Edit Table</button>
              <button class="btn btn-danger btn-sm" id="importDeleteSelectedBtn" style="display:none">Delete Selected</button>
              <button class="btn btn-outline btn-sm" id="removeDupesBtn" style="display:none">Remove Duplicates</button>
            </div>

            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>PAN Number</th>
                    <th>Name</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="previewBody"></tbody>
              </table>
            </div>

            <div class="import-actions">
              <button class="btn btn-success" id="importBtn">Import All Valid</button>
              <button class="btn btn-outline" id="resetBtn">Choose Different File</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html?redirect=quick-entry.html';
    }

    const form = document.getElementById('entryForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    document.getElementById('authGuard').style.display = 'block';

    const panInput = document.getElementById('panNumber');
    const nameInput = document.getElementById('name');
    const panDropdown = document.getElementById('panDropdown');

    let debounceTimer;
    let selectedFromDropdown = false;
    const nameCache = {};

    function cacheEntry(pan, name) {
      nameCache[pan.toUpperCase()] = name;
    }

    async function fetchSuggestions(text) {
      const { data } = await supabase
        .from('entries')
        .select('pan_number, name')
        .ilike('pan_number', `%${text}%`)
        .order('pan_number', { ascending: true })
        .limit(10);

      const items = data || [];
      items.forEach(function (item) {
        cacheEntry(item.pan_number, item.name);
      });

      return items;
    }

    function renderDropdown(items) {
      if (items.length === 0) {
        panDropdown.classList.remove('show');
        return;
      }

      let html = '';
      items.forEach(function (item) {
        cacheEntry(item.pan_number, item.name);
        html += '<div class="dropdown-item" data-pan="' + item.pan_number + '" data-name="' + escapeHtml(item.name) + '">';
        html += '<span class="dropdown-pan">' + item.pan_number + '</span>';
        html += '<span class="dropdown-name">' + escapeHtml(item.name) + '</span>';
        html += '</div>';
      });

      panDropdown.innerHTML = html;
      panDropdown.classList.add('show');
    }

    panInput.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      selectedFromDropdown = false;

      const text = panInput.value.trim().toUpperCase();
      panInput.value = text;

      if (!text) {
        panDropdown.classList.remove('show');
        return;
      }

      debounceTimer = setTimeout(async function () {
        const items = await fetchSuggestions(text);
        renderDropdown(items);
      }, 200);
    });

    panDropdown.addEventListener('mousedown', function (e) {
      const item = e.target.closest('.dropdown-item');
      if (!item) return;

      e.preventDefault();

      selectedFromDropdown = true;
      panInput.value = item.dataset.pan;
      nameInput.value = item.dataset.name;
      panDropdown.classList.remove('show');

      nameInput.focus();
    });

    panInput.addEventListener('blur', function () {
      setTimeout(function () {
        panDropdown.classList.remove('show');
      }, 200);

      if (selectedFromDropdown) return;

      const pan = panInput.value.trim().toUpperCase();
      if (!pan) return;

      panInput.value = pan;

      if (!isValidPAN(pan)) return;

      if (nameCache[pan]) {
        nameInput.value = nameCache[pan];
        return;
      }

      supabase
        .from('entries')
        .select('name')
        .eq('pan_number', pan)
        .order('created_at', { ascending: false })
        .limit(1)
        .then(function ({ data }) {
          if (data && data.length > 0) {
            const fetchedName = data[0].name;
            nameInput.value = fetchedName;
            cacheEntry(pan, fetchedName);
          }
        });
    });

    panInput.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        panDropdown.classList.remove('show');
      }
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.autocomplete-group')) {
        panDropdown.classList.remove('show');
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(function () {
        toast.classList.remove('show');
      }, 3000);
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Saving...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Save Entry';
      }
    }

    function isValidPAN(pan) {
      return /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan.toUpperCase());
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const pan = panInput.value.trim().toUpperCase();
      const name = nameInput.value.trim();

      if (!isValidPAN(pan)) {
        showToast('Invalid PAN format. Expected: 5 letters + 4 digits + 1 letter (e.g. ABCDE1234F)', 'error');
        return;
      }

      if (!name) {
        showToast('Please enter a name.', 'error');
        return;
      }

      setLoading(true);

      const today = new Date().toISOString().slice(0, 10);

      const { error } = await supabase
        .from('entries')
        .insert({
          pan_number: pan,
          name: name,
          date: null,
          amount: 0,
          tax_amount: 0,
          deduction_percentage: 0
        });

      setLoading(false);

      if (error) {
        console.error('Error adding entry:', error);
        showToast('Failed to save: ' + error.message, 'error');
      } else {
        cacheEntry(pan, name);
        showToast('Entry saved!', 'success');
        form.reset();
        panInput.focus();
      }
    });

    // --- Import section ---
    let parsedRows = [];
    let importEditMode = false;

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const importSection = document.getElementById('importSection');
    const previewBody = document.getElementById('previewBody');
    const statsBar = document.getElementById('statsBar');
    const importBtn = document.getElementById('importBtn');
    const resetBtn = document.getElementById('resetBtn');
    const editToggleBtn = document.getElementById('editToggleBtn');
    const editToggleSection = document.getElementById('editToggleSection');
    const importDeleteSelectedBtn = document.getElementById('importDeleteSelectedBtn');
    const removeDupesBtn = document.getElementById('removeDupesBtn');

    function parseCSV(text) {
      const lines = [];
      const raw = text.split(/\r?\n/);
      for (let i = 0; i < raw.length; i++) {
        const trimmed = raw[i].trim();
        if (!trimmed) continue;
        const cols = trimmed.split(',').map(function (c) {
          return c.trim().replace(/^"|"$/g, '');
        });
        if (cols.length < 2) continue;
        if (i === 0 && cols[0].toLowerCase().includes('pan')) continue;
        lines.push(cols);
      }
      return lines;
    }

    function validateRow(pan, name) {
      const errors = [];
      if (!isValidPAN(pan)) errors.push('Invalid PAN');
      if (!name) errors.push('Name required');
      return errors;
    }

    function processRows(rawRows) {
      parsedRows = rawRows.map(function (row, idx) {
        const pan = (row[0] || '').toUpperCase().trim();
        const name = (row[1] || '').trim();
        const errors = validateRow(pan, name);
        return {
          pan_number: pan,
          name: name,
          valid: errors.length === 0,
          errors: errors,
          index: idx + 1,
          duplicate: false
        };
      });

      const seen = new Map();
      parsedRows.forEach(function (r, i) {
        if (!r.valid) return;
        const key = r.pan_number + '|' + r.name;
        if (seen.has(key)) {
          r.duplicate = true;
          r.errors.push('Duplicate in CSV');
        }
        seen.set(key, i);
      });
    }

    async function checkExistingEntries() {
      const pans = parsedRows.filter(function (r) { return r.valid && !r.duplicate; }).map(function (r) { return r.pan_number; });
      if (pans.length === 0) return;

      const { data } = await supabase
        .from('entries')
        .select('pan_number, name')
        .in('pan_number', pans);

      if (!data || data.length === 0) return;

      const existing = new Map();
      data.forEach(function (e) {
        existing.set(e.pan_number + '|' + e.name, true);
      });

      parsedRows.forEach(function (r) {
        if (!r.valid || r.duplicate) return;
        if (existing.has(r.pan_number + '|' + r.name)) {
          r.duplicate = true;
          r.errors.push('Already in database');
        }
      });
    }

    function updateStats() {
      const clean = parsedRows.filter(function (r) { return r.valid && !r.duplicate; });
      const dupes = parsedRows.filter(function (r) { return r.duplicate; });
      const invalid = parsedRows.filter(function (r) { return !r.valid; });
      let html =
        '<span class="stat-badge total">Total: ' + parsedRows.length + '</span>' +
        '<span class="stat-badge valid">Valid: ' + clean.length + '</span>';
      if (dupes.length) html += '<span class="stat-badge duplicate">Duplicates: ' + dupes.length + '</span>';
      if (invalid.length) html += '<span class="stat-badge invalid">Invalid: ' + invalid.length + '</span>';
      statsBar.innerHTML = html;
      importBtn.disabled = clean.length === 0;
      removeDupesBtn.style.display = dupes.length ? 'inline-block' : 'none';
    }

    function renderPreview() {
      let html = '';
      parsedRows.forEach(function (row, idx) {
        const cls = !row.valid ? 'import-row-invalid' : row.duplicate ? 'import-row-duplicate' : '';
        const statusText = !row.valid ? '✗ ' + row.errors.join(', ') : row.duplicate ? '⚠ ' + row.errors.join(', ') : '✓';
        html += '<tr class="' + cls + '">';
        html += '<td>' + row.index + '</td>';
        html += '<td>' + escapeHtml(row.pan_number) + '</td>';
        html += '<td>' + escapeHtml(row.name) + '</td>';
        html += '<td>' + statusText + '</td>';
        html += '</tr>';
      });
      previewBody.innerHTML = html;
      updateStats();
      importSection.style.display = 'block';
      editToggleSection.style.display = 'block';
      editToggleBtn.textContent = '✏️ Edit Table';
    }

    function renderEditablePreview() {
      let html = '';
      parsedRows.forEach(function (row, idx) {
        const errors = validateRow(row.pan_number, row.name);
        const isValid = errors.length === 0;
        const isDup = row.duplicate;
        const cls = !isValid ? 'import-row-invalid' : isDup ? 'import-row-duplicate' : '';
        const statusText = !isValid ? '✗ ' + errors.join(', ') : isDup ? '⚠ ' + errors.join(', ') : '✓';
        html += '<tr class="' + cls + '" data-row-idx="' + idx + '">';
        html += '<td><input type="checkbox" class="row-select" data-import-delete-idx="' + idx + '"></td>';
        html += '<td><input class="edit-input" type="text" value="' + escapeHtml(row.pan_number) + '" data-field="pan_number" data-idx="' + idx + '"></td>';
        html += '<td><input class="edit-input" type="text" value="' + escapeHtml(row.name) + '" data-field="name" data-idx="' + idx + '"></td>';
        html += '<td>' + statusText + '</td>';
        html += '</tr>';
      });
      previewBody.innerHTML = html;
      updateStats();
      editToggleBtn.textContent = 'Done Editing';

      previewBody.querySelectorAll('.row-select').forEach(function (cb) {
        cb.addEventListener('change', function () {
          this.closest('tr').classList.toggle('tr-selected', this.checked);
        });
      });
    }

    function readEditsFromDOM() {
      const inputs = previewBody.querySelectorAll('.edit-input');
      inputs.forEach(function (input) {
        const idx = parseInt(input.dataset.idx);
        const field = input.dataset.field;
        if (idx === undefined || isNaN(idx)) return;
        if (idx >= parsedRows.length) return;
        if (field === 'pan_number') {
          parsedRows[idx].pan_number = input.value.toUpperCase().trim();
        } else if (field === 'name') {
          parsedRows[idx].name = input.value.trim();
        }
      });

      const seen = new Map();
      parsedRows.forEach(function (row, i) {
        const errors = validateRow(row.pan_number, row.name);
        row.valid = errors.length === 0;
        row.errors = errors;
        row.duplicate = false;
      });
      parsedRows.forEach(function (row, i) {
        if (!row.valid) return;
        const key = row.pan_number + '|' + row.name;
        if (seen.has(key)) {
          row.duplicate = true;
          row.errors.push('Duplicate in CSV');
        }
        seen.set(key, i);
      });
    }

    function toggleImportEditMode() {
      if (!importEditMode) {
        renderEditablePreview();
        importEditMode = true;
        importDeleteSelectedBtn.style.display = 'inline-block';
      } else {
        readEditsFromDOM();
        renderPreview();
        importEditMode = false;
        importDeleteSelectedBtn.style.display = 'none';
      }
    }

    function deleteSelectedImport() {
      const checkboxes = previewBody.querySelectorAll('.row-select:checked');
      if (checkboxes.length === 0) {
        showToast('No rows selected.', 'error');
        return;
      }

      if (!confirm('Delete ' + checkboxes.length + ' selected entries?')) return;

      readEditsFromDOM();

      const toDelete = [];
      checkboxes.forEach(function (cb) {
        const idx = parseInt(cb.dataset.importDeleteIdx);
        if (!isNaN(idx)) toDelete.push(idx);
      });

      toDelete.sort(function (a, b) { return b - a; });
      toDelete.forEach(function (idx) {
        parsedRows.splice(idx, 1);
      });
      parsedRows.forEach(function (row, i) {
        row.index = i + 1;
      });

      renderEditablePreview();
      showToast(toDelete.length + ' entries removed.', 'success');
    }

    function removeDupesImport() {
      const toRemove = [];
      parsedRows.forEach(function (r, idx) {
        if (r.duplicate) toRemove.push(idx);
      });
      if (toRemove.length === 0) {
        showToast('No duplicates found.', 'error');
        return;
      }
      toRemove.sort(function (a, b) { return b - a; });
      toRemove.forEach(function (idx) {
        parsedRows.splice(idx, 1);
      });
      parsedRows.forEach(function (row, i) {
        row.index = i + 1;
      });

      if (importEditMode) {
        renderEditablePreview();
      } else {
        renderPreview();
      }
      showToast(toRemove.length + ' duplicate entries removed.', 'success');
    }

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = async function (e) {
        const raw = parseCSV(e.target.result);
        if (raw.length === 0) {
          showToast('No valid rows found in CSV.', 'error');
          return;
        }
        processRows(raw);
        importEditMode = false;
        renderPreview();

        if (parsedRows.some(function (r) { return r.valid; })) {
          await checkExistingEntries();
          renderPreview();
        }

        uploadZone.classList.add('has-file');
        uploadZone.querySelector('.upload-zone-text').textContent = file.name;
      };
      reader.readAsText(file);
    }

    editToggleBtn.addEventListener('click', toggleImportEditMode);

    uploadZone.addEventListener('click', function () {
      fileInput.click();
    });

    uploadZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', function () {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', function (e) {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', function () {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    resetBtn.addEventListener('click', function () {
      parsedRows = [];
      importEditMode = false;
      fileInput.value = '';
      importSection.style.display = 'none';
      editToggleSection.style.display = 'none';
      importDeleteSelectedBtn.style.display = 'none';
      uploadZone.classList.remove('has-file');
      uploadZone.querySelector('.upload-zone-text').textContent = 'Click to select CSV file';
    });

    importDeleteSelectedBtn.addEventListener('click', deleteSelectedImport);
    removeDupesBtn.addEventListener('click', removeDupesImport);

    importBtn.addEventListener('click', async function () {
      if (importEditMode) {
        readEditsFromDOM();
      }
      const validRows = parsedRows.filter(function (r) { return r.valid && !r.duplicate; });
      if (validRows.length === 0) return;

      importBtn.disabled = true;
      importBtn.innerHTML = '<span class="spinner"></span> Importing...';

      const today = new Date().toISOString().slice(0, 10);

      const { error } = await supabase
        .from('entries')
        .insert(validRows.map(function (r) {
          return {
            pan_number: r.pan_number,
            name: r.name,
            date: null,
            amount: 0,
            tax_amount: 0,
            deduction_percentage: 0
          };
        }));

      importBtn.disabled = false;
      importBtn.innerHTML = 'Import All Valid';

      if (error) {
        console.error('Import error:', error);
        showToast('Import failed: ' + error.message, 'error');
      } else {
        showToast(validRows.length + ' entries imported successfully!', 'success');
        resetBtn.click();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async function () {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
